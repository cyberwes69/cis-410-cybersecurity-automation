name: Docker Compose
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create docker-compose.yml
        run: |
          cat > docker-compose.yml <<'EOF'
          services:
            web:
              build: .
              container_name: cis410-web
              ports:
                # HOST_PORT is injected by the deploy workflow per environment:
                #   deploy-dev.yml     → HOST_PORT=5000
                #   deploy-staging.yml → HOST_PORT=5001
                #   deploy-prod.yml    → HOST_PORT=5002
                # Default to 5000 for local dev if not set.
                - "${HOST_PORT:-5000}:5000"
              restart: unless-stopped
              environment:
                # ENVIRONMENT, DEPLOY_TIME, GITHUB_SHA, GITHUB_REF_NAME are all
                # injected by the deploy workflow at run time so the dashboard shows
                # live deployment metadata for each environment.
                - ENVIRONMENT=${ENVIRONMENT:-dev}
                - APP_VERSION=1.0.0
                - DEPLOY_TIME=${DEPLOY_TIME:-unknown}
                - COMMIT_SHA=${GITHUB_SHA:-local}
                - BRANCH=${GITHUB_REF_NAME:-main}
                - WORKFLOW=deploy-${ENVIRONMENT:-dev}.yml
          EOF
      - name: Start Docker services
        run: docker compose up -d
